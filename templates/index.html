<!DOCTYPE html>
<html>
<head>
  <title>Iris Species Classifier - st126112</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      max-width: 600px;
      width: 100%;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    h2 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .student-id {
      text-align: center;
      color: #666;
      font-size: 0.9em;
      margin-bottom: 30px;
      font-style: italic;
    }

    label {
      display: block;
      color: #555;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.95em;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 1.1em;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    #result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 8px;
      font-size: 1.2em;
      font-weight: bold;
      text-align: center;
      display: none;
    }

    .probabilities {
      margin-top: 15px;
      font-size: 0.9em;
      font-weight: normal;
    }

    .prob-item {
      margin: 5px 0;
      padding: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 5px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #888;
      font-size: 0.85em;
    }

    .hint {
      font-size: 0.85em;
      color: #888;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Iris Species Classifier</h2>
    <div class="student-id">Student ID: st126112 | ML Model Deployment</div>

    <div class="hint">
      Enter flower measurements in centimeters
    </div>

    <label>Sepal Length (cm)</label>
    <input type="number" id="sepal_length" min="0" max="10" step="0.1" value="5.1" placeholder="e.g., 5.1">

    <label>Sepal Width (cm)</label>
    <input type="number" id="sepal_width" min="0" max="10" step="0.1" value="3.5" placeholder="e.g., 3.5">

    <label>Petal Length (cm)</label>
    <input type="number" id="petal_length" min="0" max="10" step="0.1" value="1.4" placeholder="e.g., 1.4">

    <label>Petal Width (cm)</label>
    <input type="number" id="petal_width" min="0" max="10" step="0.1" value="0.2" placeholder="e.g., 0.2">

    <button onclick="predict()">Classify Iris Species</button>

    <div id="result"></div>

    <div class="footer">
      Powered by Random Forest Classifier | Flask & Docker
    </div>
  </div>

  <script>
    async function predict() {
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = 'Analyzing flower measurements...';
      resultDiv.style.background = '#f0f0f0';
      resultDiv.style.color = '#666';

      try {
        const payload = {
          sepal_length: parseFloat(document.getElementById('sepal_length').value),
          sepal_width: parseFloat(document.getElementById('sepal_width').value),
          petal_length: parseFloat(document.getElementById('petal_length').value),
          petal_width: parseFloat(document.getElementById('petal_width').value)
        };

        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Prediction failed');
        }

        const data = await response.json();

        // Color by species
        const colors = {
          'Setosa': 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
          'Versicolor': 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
          'Virginica': 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)'
        };

        resultDiv.style.background = colors[data.species];
        resultDiv.style.color = 'white';

        const confPercent = (data.confidence * 100).toFixed(1);

        resultDiv.innerHTML = `
          <div style="font-size: 1.5em; margin-bottom: 10px;">Species: ${data.species}</div>
          <div style="font-size: 1em;">Confidence: ${confPercent}%</div>
          <div class="probabilities">
            <div class="prob-item">Setosa: ${(data.probabilities.Setosa * 100).toFixed(1)}%</div>
            <div class="prob-item">Versicolor: ${(data.probabilities.Versicolor * 100).toFixed(1)}%</div>
            <div class="prob-item">Virginica: ${(data.probabilities.Virginica * 100).toFixed(1)}%</div>
          </div>
        `;

      } catch (error) {
        resultDiv.style.background = '#ffebee';
        resultDiv.style.color = '#c62828';
        resultDiv.innerHTML = 'Error: Could not make prediction';
      }
    }
  </script>
</body>
</html>
